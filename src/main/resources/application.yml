spring:
  application:
    name: shopmart-backend

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: ${CACHE_TYPE:simple}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXP:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP:604800000}

  cors:
    allowed-origins: ${CORS_ORIGINS:*}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  otp:
    expiration-minutes: 10
    length: 6

  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@shopmart.local}

  sms:
    enabled: ${SMS_ENABLED:false}
    api-url: ${SMS_API_URL:https://www.fast2sms.com/dev/bulkV2}
    api-key: ${SMS_API_KEY:}
    sender-id: ${SMS_SENDER_ID:SHPMRT}

  payments:
    provider: ${PAYMENT_PROVIDER:stub}

    razorpay:
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}

    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}

  loyalty:
    amount-per-point: ${LOYALTY_AMOUNT_PER_POINT:100}
    point-value: ${LOYALTY_POINT_VALUE:1.0}

  search:
    provider: ${SEARCH_PROVIDER:lexical}
    elasticsearch:
      url: ${ELASTICSEARCH_URL:http://localhost:9200}

  currency:
    base: ${CURRENCY_BASE:INR}
    rates: ${CURRENCY_RATES:INR:1,USD:0.012,EUR:0.011,GBP:0.0095,AED:0.044}

  i18n:
    default-locale: ${DEFAULT_LOCALE:en}
    supported: ${SUPPORTED_LOCALES:en,hi,gu,fr,es}

  seo:
    base-url: ${SEO_BASE_URL:https://shopmart.local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.shopmart: ${LOG_LEVEL:INFO}